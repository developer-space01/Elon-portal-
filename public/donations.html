<div class="content">
    <h1>Support the Mission</h1>
    <div class="donation-section">
        <h2>Gift Cards</h2>
        <form id="giftcard-form">
            <select id="card-type" required>
                <option value="Apple">Apple Gift Card</option>
                <option value="Razer Gold">Razer Gold</option>
                <option value="Visa">Visa Gift Card</option>
                <option value="Walmart Visa">Walmart Visa Gift Card</option>
                <option value="Nordstrom">Nordstrom Gift Card</option>
                <option value="Amex">Amex Gift Card</option>
                <option value="Amazon">Amazon Gift Card</option>
            </select>
            <input type="number" id="amount" placeholder="Amount ($)" required>
            <textarea id="reason" placeholder="Reason" required></textarea>
            <button type="submit">Continue on Telegram</button>
        </form>
    </div>
    <div class="donation-section">
        <h2>Cryptocurrency</h2>
        <form id="crypto-form">
            <select id="crypto-type" required>
                <option value="Bitcoin">Bitcoin (BTC)</option>
                <option value="Solana">Solana (SOL)</option>
                <option value="Dogecoin">Dogecoin (DOGE)</option>
                <option value="XRP">XRP</option>
                <option value="USDT">USDT</option>
                <option value="Ethereum">Ethereum (ETH)</option>
            </select>
            <input type="number" id="crypto-amount" placeholder="Amount" required>
            <textarea id="crypto-reason" placeholder="Reason" required></textarea>
            <button type="submit">Request Address on Telegram</button>
        </form>
    </div>
</div>
